<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI智能截屏</title>
<link rel="stylesheet" href="capture-style.css">
</head>
<body>

<div class="phone-statusbar">
  <span id="statusTime">10:35</span>
  <div class="phone-statusbar-right">
    <svg width="16" height="12" viewBox="0 0 16 12"><path d="M1 8h2v4H1zM5 5h2v7H5zM9 2h2v10H9zM13 0h2v12h-2z" fill="currentColor" opacity="0.9"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2C5.8 2 3.8 2.9 2.3 4.3L1 3C2.8 1.1 5.3 0 8 0s5.2 1.1 7 3l-1.3 1.3C12.2 2.9 10.2 2 8 2zm3.5 3.5L10.2 6.8C9.6 6.3 8.8 6 8 6s-1.6.3-2.2.8L4.5 5.5C5.4 4.6 6.6 4 8 4s2.6.6 3.5 1.5zM8 8c-.8 0-1.5.7-1.5 1.5S7.2 11 8 11s1.5-.7 1.5-1.5S8.8 8 8 8z" fill="currentColor"/></svg>
    <svg width="22" height="12" viewBox="0 0 22 12"><rect x="0" y="1" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1.2" fill="none"/><rect x="18.5" y="3.5" width="2" height="5" rx="1" fill="currentColor" opacity="0.4"/><rect x="1.5" y="2.5" width="12" height="7" rx="1" fill="#34D399"/></svg>
  </div>
</div>

<div class="header">
  <div class="header-side"></div>
  <div class="header-title">AI智能截屏</div>
  <div class="header-side"></div>
</div>

<div class="source-bar">
  <div class="source-info">
    <div class="source-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
    </div>
    <div class="source-text">
      <div class="source-name">Q2产品需求评审会</div>
      <div class="source-detail">
        <span class="recording-dot"></span>
        投屏捕获中 · 腾讯会议
      </div>
    </div>
  </div>
  <div class="capture-status" id="captureStatus">
    <span class="capture-count" id="captureCount">0</span>
    <span class="capture-label">张已捕获</span>
  </div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar" id="progressBar" style="width:0%"></div>
</div>

<div class="capture-grid" id="captureGrid">
  <div class="capture-empty" id="emptyState">
    <div class="empty-icon">
      <svg width="144" height="144" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/><circle cx="12" cy="10" r="2"/><path d="M8 10h0"/></svg>
    </div>
    <div class="empty-title">等待投屏内容...</div>
    <div class="empty-sub">检测到投屏画面变化时将自动截取并去重</div>
    <div class="empty-timer">每 30s 自动检测一次</div>
  </div>
</div>

<div class="bottom-bar" id="bottomBar">
  <div class="bottom-actions-row" id="actionsRunning">
    <button class="action-btn-capture" id="pauseBtn">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
      暂停捕获
    </button>
    <button class="action-btn-capture stop" id="stopBtn">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      结束
    </button>
  </div>
  <div class="bottom-actions-row done-actions" id="actionsDone" style="display:none">
    <button class="action-btn-capture primary" id="savePdfBtn">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M9 15h6"/><path d="M12 12v6"/></svg>
      保存为 PDF
    </button>
    <button class="action-btn-capture note" id="saveNoteBtn">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      存到原子笔记
    </button>
  </div>
  <div class="home-indicator"></div>
</div>

<div class="lightbox" id="lightbox">
  <div class="lightbox-header">
    <span class="lightbox-page" id="lightboxPage">1 / 10</span>
    <button class="lightbox-close" id="lightboxClose">
      <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="lightbox-body">
    <button class="lightbox-nav prev" id="lightboxPrev">
      <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="lightbox-slide" id="lightboxSlide"></div>
    <button class="lightbox-nav next" id="lightboxNext">
      <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
  <div class="lightbox-title" id="lightboxTitle"></div>
</div>

<div class="toast" id="toast"></div>

<script src="capture-app.js"></script>
</body>
</html>
