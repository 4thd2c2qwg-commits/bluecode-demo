<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI转写</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone-statusbar">
  <span id="statusTime">10:35</span>
  <div class="phone-statusbar-right">
    <svg width="16" height="12" viewBox="0 0 16 12"><path d="M1 8h2v4H1zM5 5h2v7H5zM9 2h2v10H9zM13 0h2v12h-2z" fill="currentColor" opacity="0.9"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2C5.8 2 3.8 2.9 2.3 4.3L1 3C2.8 1.1 5.3 0 8 0s5.2 1.1 7 3l-1.3 1.3C12.2 2.9 10.2 2 8 2zm3.5 3.5L10.2 6.8C9.6 6.3 8.8 6 8 6s-1.6.3-2.2.8L4.5 5.5C5.4 4.6 6.6 4 8 4s2.6.6 3.5 1.5zM8 8c-.8 0-1.5.7-1.5 1.5S7.2 11 8 11s1.5-.7 1.5-1.5S8.8 8 8 8z" fill="currentColor"/></svg>
    <svg width="22" height="12" viewBox="0 0 22 12"><rect x="0" y="1" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1.2" fill="none"/><rect x="18.5" y="3.5" width="2" height="5" rx="1" fill="currentColor" opacity="0.4"/><rect x="1.5" y="2.5" width="12" height="7" rx="1" fill="#34D399"/></svg>
  </div>
</div>

<div class="header">
  <div class="header-side">
    <button class="header-btn" title="搜索">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    </button>
  </div>
  <span class="header-title">AI转写</span>
  <div class="header-side">
    <button class="header-btn" title="更多">
      <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
    </button>
  </div>
</div>

<div class="source-bar">
  <div class="source-info">
    <div class="source-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><path d="M12 19v4"/><path d="M8 23h8"/></svg>
    </div>
    <div class="source-text">
      <span class="source-name">系统音频 · Q2产品需求评审会</span>
      <span class="source-detail">
        <span class="recording-dot"></span>
        转写中 · 腾讯会议 · <span id="speakerCount">4</span> 位说话人
      </span>
    </div>
  </div>
  <div class="source-right">
    <div class="waveform">
      <div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div>
      <div class="waveform-bar"></div><div class="waveform-bar"></div>
    </div>
    <span class="duration-text" id="duration">00:00</span>
  </div>
</div>

<div class="speaker-filter">
  <div class="filter-chip active" data-filter="all">全部</div>
  <div class="filter-chip" data-filter="me">
    <span class="filter-dot" style="background:var(--speaker-a)"></span>我
  </div>
  <div class="filter-chip" data-filter="zy">
    <span class="filter-dot" style="background:var(--speaker-b)"></span>张毅
  </div>
  <div class="filter-chip" data-filter="u1">
    <span class="filter-dot" style="background:var(--speaker-c)"></span>未知说话人1
  </div>
  <div class="filter-chip" data-filter="u2">
    <span class="filter-dot" style="background:var(--speaker-d)"></span>未知说话人2
  </div>
</div>

<div class="transcript-area" id="transcriptArea"></div>

<div class="ask-bubble" id="askBubble">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
  问小V
</div>

<div class="bottom-bar">
  <div class="bottom-left">
    <div class="bottom-stat"><span class="bottom-stat-value" id="charCount">0</span><span class="bottom-stat-label">字</span></div>
    <div class="bottom-divider"></div>
    <div class="bottom-stat"><span class="bottom-stat-value" id="sentenceCount">0</span><span class="bottom-stat-label">段</span></div>
  </div>
  <div class="bottom-actions">
    <button class="action-btn" id="pauseBtn">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
      暂停
    </button>
    <button class="action-btn stop-btn" id="stopBtn">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      结束
    </button>
  </div>
  <div class="home-indicator"></div>
</div>

<script src="app.js"></script>
</body>
</html>
