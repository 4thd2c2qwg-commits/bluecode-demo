<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>蓝心小V</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 2200px; height: 2480px; overflow: hidden; }
      :root {
        --font: 'vivo Sans SC VF', 'PingFang SC', 'Noto Sans SC', 'HarmonyOS Sans SC', 'Microsoft YaHei', sans-serif;
      }

      .page {
        width: 2200px; height: 2480px;
        background-color: #f4f6fc;
        position: fixed; top: 0; left: 0;
        overflow: hidden;
        display: flex; flex-direction: column;
        z-index: 999;
      }

      .status-bar {
        width: 100%; height: 90px;
        position: relative; flex-shrink: 0;
      }
      .status-bar-content {
        position: relative; width: 100%; height: 90px;
        display: flex; justify-content: space-between; align-items: center;
        padding: 0 60px;
      }
      .status-time {
        font-family: var(--font); font-size: 40px;
        font-weight: 600; line-height: 48px; color: #000;
      }

      .nav-bar {
        width: 100%; height: 168px;
        display: flex; justify-content: space-between; align-items: center;
        padding: 0 48px; flex-shrink: 0;
      }
      .nav-bar-left { display: flex; align-items: center; gap: 24px; }
      .menu-icon-container {
        width: 96px; height: 96px;
        display: flex; align-items: center; justify-content: center;
      }
      .menu-icon-container svg { width: 60px; height: 60px; }
      .nav-title {
        font-family: var(--font); font-size: 54px;
        font-weight: 600; color: #000;
      }
      .nav-bar-right { display: flex; align-items: center; gap: 66px; }
      .nav-icon {
        width: 72px; height: 72px;
        display: flex; align-items: center; justify-content: center; cursor: pointer;
      }
      .nav-icon svg { width: 72px; height: 72px; }

      .content-area {
        flex: 1; display: flex; flex-direction: column;
        overflow: hidden; position: relative;
      }

      .home-view {
        width: 100%; height: 100%;
        display: flex; flex-direction: column; justify-content: center;
        transition: opacity 0.4s ease, transform 0.4s ease;
      }
      .home-view.hidden {
        opacity: 0; transform: translateY(-40px);
        pointer-events: none; position: absolute; top: 0; left: 0;
      }
      .greeting-container { width: 100%; padding: 0 60px; }
      .greeting-inner { display: flex; flex-direction: column; gap: 18px; }
      .greeting-title {
        font-family: var(--font); font-size: 78px;
        font-weight: 600; color: rgba(0,0,0,0.8);
      }
      .greeting-sub {
        font-family: var(--font); font-size: 42px;
        font-weight: 400; line-height: 60px; color: rgba(0,0,0,0.47);
      }
      .cards-container { width: 100%; padding: 0 48px; margin-top: 48px; }
      .cards-inner { display: flex; flex-direction: column; gap: 24px; }
      .card {
        width: 100%; height: 144px; border-radius: 36px;
        background-color: rgba(255,255,255,0.64);
        box-shadow: 0px 12px 60px 0px rgba(43,52,100,0.04);
        display: flex; align-items: center; gap: 36px;
        padding: 0 48px 0 0;
      }
      .card-icon-container {
        width: 120px; height: 144px;
        display: flex; align-items: center; justify-content: center;
        padding-left: 48px; flex-shrink: 0;
      }
      .emoji-container { width: 72px; height: 72px; position: relative; }
      .emoji-container img {
        width: 72px; height: 72px; position: absolute; top: 0; left: 0; object-fit: contain;
      }
      .card-icon-placeholder { width: 72px; height: 72px; }
      .card-icon-placeholder img { width: 72px; height: 72px; object-fit: contain; }
      .card-text-area { flex: 1; min-width: 0; }
      .card-text {
        font-family: var(--font); font-size: 42px; font-weight: 500;
        color: rgba(0,0,0,0.8); white-space: nowrap;
        overflow: hidden; text-overflow: ellipsis; display: block;
      }
      .card-arrow-container {
        width: 72px; height: 72px; border-radius: 120px;
        display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      }
      .card-arrow-container svg { width: 24px; height: 24px; }

      .chat-view {
        width: 100%; flex: 1;
        display: flex; flex-direction: column;
        opacity: 0; transform: translateY(40px);
        transition: opacity 0.4s ease, transform 0.4s ease;
        overflow-y: auto; padding: 40px 48px;
      }
      .chat-view.visible {
        opacity: 1; transform: translateY(0);
      }

      .chat-bubble {
        max-width: 85%; padding: 40px 52px;
        border-radius: 40px; font-family: var(--font);
        font-size: 42px; line-height: 66px; font-weight: 400;
        margin-bottom: 40px; opacity: 0;
        transform: translateY(20px);
        animation: bubbleIn 0.4s ease forwards;
      }
      @keyframes bubbleIn {
        to { opacity: 1; transform: translateY(0); }
      }
      .chat-bubble.user {
        align-self: flex-end;
        background: linear-gradient(135deg, #5b8def, #4a6cf7);
        color: #fff; border-radius: 40px 40px 12px 40px;
      }
      .chat-bubble.ai {
        align-self: flex-start;
        background: #fff; color: rgba(0,0,0,0.85);
        border-radius: 12px 40px 40px 40px;
        box-shadow: 0 6px 30px rgba(0,0,0,0.06);
      }

      .ai-avatar-row {
        display: flex; align-items: center; gap: 20px;
        margin-bottom: 16px; opacity: 0;
        animation: bubbleIn 0.3s ease forwards;
      }
      .ai-avatar {
        width: 72px; height: 72px; border-radius: 50%;
        overflow: hidden; position: relative; flex-shrink: 0;
      }
      .ai-avatar img { width: 100%; height: 100%; object-fit: cover; }
      .ai-avatar-name {
        font-family: var(--font); font-size: 36px;
        font-weight: 500; color: rgba(0,0,0,0.5);
      }

      .typing-cursor {
        display: inline-block; width: 4px; height: 42px;
        background: rgba(0,0,0,0.4); margin-left: 4px;
        vertical-align: middle; border-radius: 2px;
        animation: cursorBlink 0.6s infinite;
      }
      @keyframes cursorBlink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      .agent-cards-wrap {
        display: flex; flex-direction: column; gap: 24px;
        margin-top: 32px;
      }
      .agent-card {
        display: flex; align-items: center; gap: 32px;
        background: linear-gradient(135deg, #f0f4ff 0%, #e8eeff 100%);
        border-radius: 32px; padding: 36px 40px;
        cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease;
        opacity: 0; transform: translateY(16px) scale(0.97);
      }
      .agent-card.show {
        animation: cardIn 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
      }
      @keyframes cardIn {
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      .agent-card:active { transform: scale(0.97); }
      .agent-card-icon {
        width: 96px; height: 96px; border-radius: 24px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; font-size: 48px;
      }
      .agent-card-icon.blue { background: linear-gradient(135deg, #5b8def, #4a6cf7); }
      .agent-card-icon.green { background: linear-gradient(135deg, #34d399, #10b981); }
      .agent-card-icon.purple { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
      .agent-card-icon svg { width: 52px; height: 52px; }
      .agent-card-body { flex: 1; min-width: 0; }
      .agent-card-title {
        font-family: var(--font); font-size: 42px;
        font-weight: 600; color: rgba(0,0,0,0.85);
      }
      .agent-card-desc {
        font-family: var(--font); font-size: 34px;
        font-weight: 400; color: rgba(0,0,0,0.45);
        margin-top: 8px;
      }
      .agent-card-arrow {
        width: 48px; height: 48px; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
      }
      .agent-card-arrow svg { width: 28px; height: 28px; }
      .agent-card-arrow.has-status { display: none; }

      .agent-card-status {
        display: flex; align-items: center; gap: 10px;
        flex-shrink: 0; opacity: 0;
        transition: opacity 0.4s ease;
      }
      .agent-card-status.active {
        opacity: 1;
      }
      .status-dot {
        width: 12px; height: 12px; border-radius: 50%;
        flex-shrink: 0; position: relative;
      }
      .status-dot::before {
        content: ''; position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        border-radius: 50%;
        animation: statusPulse 1.5s ease-in-out infinite;
      }
      .status-dot.blue { background: #4a6cf7; }
      .status-dot.blue::before { background: #4a6cf7; }
      .status-dot.green { background: #10b981; }
      .status-dot.green::before { background: #10b981; }
      .status-dot.purple { background: #7c3aed; }
      .status-dot.purple::before { background: #7c3aed; }
      @keyframes statusPulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(1.6); }
      }
      .status-text {
        font-family: var(--font); font-size: 28px;
        font-weight: 400; color: rgba(0,0,0,0.4);
        white-space: nowrap;
      }

      .bottom-area {
        width: 100%; flex-shrink: 0;
        display: flex; flex-direction: column;
        padding-top: 42px;
      }
      .chip-scroll-container {
        width: 100%; overflow-x: auto; overflow-y: hidden;
        padding: 0 48px; scrollbar-width: none;
      }
      .chip-scroll-container::-webkit-scrollbar { display: none; }
      .chip-scroll-inner { display: flex; gap: 24px; white-space: nowrap; }
      .chip {
        height: 96px; border-radius: 30px;
        border: 1px dashed rgba(255,255,255,0.8);
        background: rgba(255,255,255,0.75);
        box-shadow: 0 6px 30px 0 rgba(43,52,100,0.04);
        display: flex; align-items: center; justify-content: center;
        padding: 24px 30px; gap: 12px; cursor: pointer; flex-shrink: 0;
      }
      .chip-icon { width: 48px; height: 48px; object-fit: contain; }
      .chip svg { width: 48px; height: 48px; }
      .chip-label {
        font-family: var(--font); font-size: 39px;
        font-weight: 500; color: rgba(102,102,102,0.99); white-space: nowrap;
      }
      .input-box-container { width: 100%; padding: 48px 48px 0; }
      .input-box {
        width: 100%; height: 126px; border-radius: 72px;
        border: 1px dashed rgba(255,255,255,0.8);
        background: rgba(255,255,255,0.9);
        box-shadow: 0 6px 30px 0 rgba(43,52,100,0.04),
          0 12px 90px 0 rgba(0,0,0,0.04);
        display: flex; align-items: center; justify-content: center;
        gap: 9px; padding: 0 30px;
      }
      .input-area {
        flex: 1; display: flex; align-items: center; gap: 24px; min-width: 0;
      }
      .vivo-ball-container {
        width: 72px; height: 72px; position: relative;
        border-radius: 830px; flex-shrink: 0;
        box-shadow: inset -1.65px 1.65px 3.27px 0 rgba(255,255,255,0.5);
        overflow: hidden;
      }
      .vivo-ball-outer {
        width: 72px; height: 72px; position: absolute; top: 0; left: 0;
        object-fit: cover; filter: blur(1.32px);
      }
      .vivo-ball-inner {
        width: 54px; height: 54px; position: absolute; top: 9px; left: 9px;
        object-fit: contain;
      }
      .input-placeholder {
        font-family: var(--font); font-size: 42px; font-weight: 400;
        line-height: 60px; color: rgba(85,85,85,0.35);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .input-typing-text {
        font-family: var(--font); font-size: 42px; font-weight: 500;
        line-height: 60px; color: rgba(0,0,0,0.85);
        white-space: nowrap;
      }
      .input-typing-cursor {
        display: inline-block; width: 3px; height: 44px;
        background: #4a6cf7; margin-left: 2px;
        vertical-align: middle; border-radius: 2px;
        animation: cursorBlink 0.6s infinite;
      }
      .send-btn {
        width: 72px; height: 72px; border-radius: 50%;
        background: linear-gradient(135deg, #5b8def, #4a6cf7);
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; cursor: pointer;
        transform: scale(0); opacity: 0;
        transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s ease;
      }
      .send-btn.visible { transform: scale(1); opacity: 1; }
      .send-btn svg { width: 36px; height: 36px; }
      .plus-button {
        width: 72px; height: 72px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; cursor: pointer;
      }
      .plus-button svg { width: 42px; height: 42px; }
      .bottom-nav {
        width: 100%; height: 54px;
        display: flex; align-items: center; justify-content: center;
        margin-top: 42px;
      }
      .bottom-nav-indicator {
        width: 432px; height: 12px; border-radius: 8px;
        background: #333; opacity: 0.3;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="status-bar">
        <div class="status-bar-content">
          <span class="status-time" id="statusTime">10:35</span>
        </div>
      </div>

      <div class="nav-bar">
        <div class="nav-bar-left">
          <div class="menu-icon-container">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="3" y="5" width="14" height="1.5" rx="0.75" fill="rgba(0,0,0,0.8)"/>
              <rect x="3" y="9.25" width="14" height="1.5" rx="0.75" fill="rgba(0,0,0,0.8)"/>
              <rect x="3" y="13.5" width="14" height="1.5" rx="0.75" fill="rgba(0,0,0,0.8)"/>
            </svg>
          </div>
          <span class="nav-title">蓝心小V</span>
        </div>
        <div class="nav-bar-right">
          <div class="nav-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2a7.2 7.2 0 01-6-3.22c.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08a7.2 7.2 0 01-6 3.22z" fill="rgba(0,0,0,0.8)"/>
            </svg>
          </div>
          <div class="nav-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="rgba(0,0,0,0.8)"/>
            </svg>
          </div>
          <div class="nav-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="5" r="2" fill="rgba(0,0,0,0.8)"/>
              <circle cx="12" cy="12" r="2" fill="rgba(0,0,0,0.8)"/>
              <circle cx="12" cy="19" r="2" fill="rgba(0,0,0,0.8)"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="content-area">
        <div class="home-view" id="homeView">
          <div class="greeting-container">
            <div class="greeting-inner">
              <span class="greeting-title">你今天有行程安排哦</span>
              <span class="greeting-sub">你正在乘坐飞机前往深圳...</span>
            </div>
          </div>
          <div class="cards-container">
            <div class="cards-inner">
              <div class="card">
                <div class="card-icon-container">
                  <div class="emoji-container">
                    <img src="images/emoji-cake-body.png" alt=""/>
                    <img src="images/emoji-cake-cream.png" alt=""/>
                    <img src="images/emoji-cake-candle.png" alt=""/>
                  </div>
                </div>
                <div class="card-text-area"><span class="card-text">今天是小明的生日，要送上祝福吗？</span></div>
                <div class="card-arrow-container">
                  <svg width="8" height="8" viewBox="0 0 8 8" fill="none" style="transform:rotate(45deg)"><path d="M1 1h6v6M1 1l6 6" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
              </div>
              <div class="card">
                <div class="card-icon-container">
                  <div class="emoji-container">
                    <img src="images/emoji-gift-ring.png" alt=""/>
                    <img src="images/emoji-gift-label.png" alt=""/>
                    <img src="images/emoji-gift-ribbon.png" alt=""/>
                  </div>
                </div>
                <div class="card-text-area"><span class="card-text">你收到一份礼物，快来看看吧</span></div>
                <div class="card-arrow-container">
                  <svg width="8" height="8" viewBox="0 0 8 8" fill="none" style="transform:rotate(45deg)"><path d="M1 1h6v6M1 1l6 6" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
              </div>
              <div class="card">
                <div class="card-icon-container">
                  <div class="card-icon-placeholder"><img src="images/chip-icon-remove-person.png" alt=""/></div>
                </div>
                <div class="card-text-area"><span class="card-text">航班已延误，要查看最新动态吗？</span></div>
                <div class="card-arrow-container">
                  <svg width="8" height="8" viewBox="0 0 8 8" fill="none" style="transform:rotate(45deg)"><path d="M1 1h6v6M1 1l6 6" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="chat-view" id="chatView"></div>
      </div>

      <div class="bottom-area">
        <div class="chip-scroll-container">
          <div class="chip-scroll-inner">
            <div class="chip">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 2.5a2 2 0 110 4 2 2 0 010-4zM8 12.5c-1.87 0-3.5-.94-4.5-2.38C3.97 8.87 6.5 8 8 8s4.03.87 4.5 2.12A5.49 5.49 0 018 12.5z" fill="rgba(102,102,102,0.99)"/></svg>
              <span class="chip-label">深度思考</span>
            </div>
            <div class="chip">
              <img src="images/chip-icon-remove-person.png" alt="" class="chip-icon"/>
              <span class="chip-label">帮我写文案</span>
            </div>
            <div class="chip">
              <img src="images/chip-icon-remove-person.png" alt="" class="chip-icon"/>
              <span class="chip-label">翻译助手</span>
            </div>
            <div class="chip">
              <img src="images/chip-icon-remove-person.png" alt="" class="chip-icon"/>
              <span class="chip-label">日程管理</span>
            </div>
          </div>
        </div>
        <div class="input-box-container">
          <div class="input-box">
            <div class="input-area">
              <div class="vivo-ball-container">
                <img src="images/vivo-ball-outer.png" alt="" class="vivo-ball-outer"/>
                <img src="images/vivo-ball-inner.png" alt="" class="vivo-ball-inner"/>
              </div>
              <span class="input-placeholder" id="inputPlaceholder">点击输入或按住说话</span>
            </div>
            <div class="plus-button">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="rgba(0,0,0,0.8)" stroke-width="1.5" stroke-linecap="round"/></svg>
            </div>
          </div>
        </div>
        <div class="bottom-nav"><div class="bottom-nav-indicator"></div></div>
      </div>
    </div>

    <script>
    (function() {
      var homeView = document.getElementById('homeView');
      var chatView = document.getElementById('chatView');
      var inputPlaceholder = document.getElementById('inputPlaceholder');
      var statusTimeEl = document.getElementById('statusTime');

      function updateClock() {
        var now = new Date();
        statusTimeEl.textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
      }
      setInterval(updateClock, 30000);
      updateClock();

      var agents = [
        {
          id: 'transcribe', title: 'AI转写',
          desc: '实时语音转文字，自动识别说话人',
          color: 'blue',
          icon: '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M12 1v14M8 5v6M16 5v6M4 9v2M20 9v2"/><path d="M8 19h8M12 15v4"/></svg>'
        },
        {
          id: 'summary', title: 'AI总结',
          desc: '智能提取会议要点与待办事项',
          color: 'green',
          icon: '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><rect x="4" y="3" width="16" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="14" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>'
        },
        {
          id: 'capture', title: 'AI智能截屏',
          desc: '自动捕获会议演示文稿内容',
          color: 'purple',
          icon: '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>'
        }
      ];

      var aiReplyText = '检测到你正在腾讯会议中开会，我可以为你提供以下 AI 服务，辅助你更高效地参与会议：';

      function delay(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

      function typeText(el, text, speed) {
        return new Promise(function(resolve) {
          var i = 0;
          var cursor = document.createElement('span');
          cursor.className = 'typing-cursor';
          el.appendChild(cursor);
          function tick() {
            if (i < text.length) {
              cursor.before(document.createTextNode(text[i]));
              i++;
              var s = speed + Math.random() * 20 - 10;
              var ch = text[i - 1];
              if (ch === '，' || ch === '。' || ch === '：') s += 60;
              setTimeout(tick, s);
            } else {
              cursor.remove();
              resolve();
            }
          }
          tick();
        });
      }

      function scrollChatToBottom() {
        chatView.scrollTop = chatView.scrollHeight;
      }

      function typeInInput(text, speed) {
        return new Promise(function(resolve) {
          inputPlaceholder.style.display = 'none';
          var inputArea = inputPlaceholder.parentElement;
          var typingSpan = document.createElement('span');
          typingSpan.className = 'input-typing-text';
          var cursorSpan = document.createElement('span');
          cursorSpan.className = 'input-typing-cursor';
          inputArea.appendChild(typingSpan);
          inputArea.appendChild(cursorSpan);

          var plusBtn = document.querySelector('.plus-button');
          plusBtn.style.display = 'none';
          var sendBtn = document.createElement('div');
          sendBtn.className = 'send-btn';
          sendBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none"><path d="M3 20l18-8L3 4v6.4L15 12 3 13.6z" fill="#fff"/></svg>';
          plusBtn.parentElement.appendChild(sendBtn);

          var i = 0;
          function tick() {
            if (i < text.length) {
              typingSpan.textContent += text[i];
              i++;
              setTimeout(tick, speed + Math.random() * 40 - 20);
            } else {
              setTimeout(function() {
                sendBtn.classList.add('visible');
              }, 100);
              setTimeout(function() {
                cursorSpan.remove();
                typingSpan.remove();
                sendBtn.remove();
                plusBtn.style.display = '';
                inputPlaceholder.style.display = '';
                resolve();
              }, 600);
            }
          }
          tick();
        });
      }

      async function startConversation() {
        await delay(1500);

        await typeInInput('开始会议辅助', 80);

        homeView.classList.add('hidden');
        chatView.classList.add('visible');

        await delay(300);

        var userBubble = document.createElement('div');
        userBubble.className = 'chat-bubble user';
        userBubble.textContent = '开始会议辅助';
        chatView.appendChild(userBubble);
        scrollChatToBottom();

        await delay(1200);

        var avatarRow = document.createElement('div');
        avatarRow.className = 'ai-avatar-row';
        avatarRow.innerHTML = '<div class="ai-avatar"><img src="images/vivo-ball-outer.png" alt=""></div><span class="ai-avatar-name">蓝心小V</span>';
        chatView.appendChild(avatarRow);
        scrollChatToBottom();

        await delay(400);

        var aiBubble = document.createElement('div');
        aiBubble.className = 'chat-bubble ai';
        chatView.appendChild(aiBubble);
        scrollChatToBottom();

        await typeText(aiBubble, aiReplyText, 40);
        scrollChatToBottom();

        await delay(300);

        var cardsWrap = document.createElement('div');
        cardsWrap.className = 'agent-cards-wrap';
        aiBubble.appendChild(cardsWrap);

        for (var k = 0; k < agents.length; k++) {
          var ag = agents[k];
          var card = document.createElement('div');
          card.className = 'agent-card';
          card.dataset.agentId = ag.id;
          card.innerHTML =
            '<div class="agent-card-icon ' + ag.color + '">' + ag.icon + '</div>' +
            '<div class="agent-card-body"><div class="agent-card-title">' + ag.title + '</div><div class="agent-card-desc">' + ag.desc + '</div></div>' +
            '<div class="agent-card-status" id="status-' + ag.id + '"><span class="status-dot ' + ag.color + '"></span><span class="status-text"></span></div>' +
            '<div class="agent-card-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="2" stroke-linecap="round"><polyline points="9 6 15 12 9 18"/></svg></div>';
          cardsWrap.appendChild(card);

          await delay(200);
          card.classList.add('show');
          scrollChatToBottom();

          (function(agentId) {
            card.addEventListener('click', function() {
              window.parent.postMessage({ type: 'switch-agent', agentId: agentId }, '*');
            });
          })(ag.id);
        }

        scrollChatToBottom();

        await delay(800);

        window.parent.postMessage({
          type: 'deploy-agents',
          agents: ['transcribe', 'summary', 'capture']
        }, '*');

        var statusMessages = {
          transcribe: [
            '正在转写中…',
            '已识别 2 位说话人',
            '已转写 3 段内容',
            '已识别 4 位说话人',
            '已转写 156 字',
            '已转写 8 段对话',
            '已转写 420 字',
            '持续转写中… 12段'
          ],
          summary: [
            '等待转写数据…',
            '正在分析对话…',
            '已提取 1 个要点',
            '正在生成摘要…',
            '已提取 3 个要点',
            '已识别 1 项待办',
            '已提取 5 个要点',
            '持续总结中…'
          ],
          capture: [
            '正在监测画面…',
            '检测到演示文稿',
            '已截取 1 页',
            '已截取 2 页',
            '检测到新幻灯片',
            '已截取 3 页',
            '已截取 4 页',
            '持续截取中… 6页'
          ]
        };

        var statusIdx = { transcribe: 0, summary: 0, capture: 0 };

        function activateStatus(agentId, delayMs) {
          setTimeout(function() {
            var el = document.getElementById('status-' + agentId);
            if (!el) return;
            el.classList.add('active');
            el.querySelector('.status-text').textContent = statusMessages[agentId][0];
            var arrow = el.parentElement.querySelector('.agent-card-arrow');
            if (arrow) arrow.classList.add('has-status');
            scrollChatToBottom();
          }, delayMs);
        }

        activateStatus('transcribe', 300);
        activateStatus('summary', 600);
        activateStatus('capture', 900);

        setInterval(function() {
          ['transcribe', 'summary', 'capture'].forEach(function(id) {
            statusIdx[id]++;
            var msgs = statusMessages[id];
            if (statusIdx[id] >= msgs.length) statusIdx[id] = msgs.length - 1;
            var el = document.getElementById('status-' + id);
            if (!el) return;
            var textEl = el.querySelector('.status-text');
            textEl.style.opacity = '0';
            setTimeout(function() {
              textEl.textContent = msgs[statusIdx[id]];
              textEl.style.opacity = '1';
            }, 200);
          });
          scrollChatToBottom();
        }, 3500);
      }

      window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'start-conversation') {
          startConversation();
        }
      });

      if (window.parent !== window) {
        startConversation();
      }
    })();
    </script>
  </body>
</html>
