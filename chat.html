<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI问答</title>
<link rel="stylesheet" href="chat-style.css">
</head>
<body>

<div class="phone-statusbar">
  <span id="statusTime">10:35</span>
  <div class="phone-statusbar-right">
    <svg width="16" height="12" viewBox="0 0 16 12"><path d="M1 8h2v4H1zM5 5h2v7H5zM9 2h2v10H9zM13 0h2v12h-2z" fill="currentColor" opacity="0.9"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2C5.8 2 3.8 2.9 2.3 4.3L1 3C2.8 1.1 5.3 0 8 0s5.2 1.1 7 3l-1.3 1.3C12.2 2.9 10.2 2 8 2zm3.5 3.5L10.2 6.8C9.6 6.3 8.8 6 8 6s-1.6.3-2.2.8L4.5 5.5C5.4 4.6 6.6 4 8 4s2.6.6 3.5 1.5zM8 8c-.8 0-1.5.7-1.5 1.5S7.2 11 8 11s1.5-.7 1.5-1.5S8.8 8 8 8z" fill="currentColor"/></svg>
    <svg width="22" height="12" viewBox="0 0 22 12"><rect x="0" y="1" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1.2" fill="none"/><rect x="18.5" y="3.5" width="2" height="5" rx="1" fill="currentColor" opacity="0.4"/><rect x="1.5" y="2.5" width="12" height="7" rx="1" fill="#34D399"/></svg>
  </div>
</div>

<div class="header">
  <div class="header-side"></div>
  <span class="header-title">AI问答</span>
  <div class="header-side"></div>
</div>

<div class="chat-area" id="chatArea">

  <div class="welcome-section" id="welcomeSection">
    <div class="welcome-text">
      <h2>Hi，我是蓝心小V~</h2>
      <p>我能帮你问答搜索、创作编辑、操作手机，发出指令试试看吧~</p>
    </div>
  </div>


</div>

<div class="bottom-section">
  <div class="suggest-chips" id="suggestChips">
    <div class="suggest-chip" id="suggest1"></div>
    <div class="suggest-chip" id="suggest2"></div>
  </div>
  <div class="input-bar">
    <div class="input-box" id="inputBox">
      <div class="input-context" id="contextCard">
        <div class="input-context-header">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>
          <span class="input-context-label">来自 AI转写</span>
          <span class="input-context-meta" id="contextMeta"></span>
          <button class="input-context-close" id="contextClose">&times;</button>
        </div>
        <div class="input-context-text" id="contextQuote"></div>
      </div>
      <div class="input-row">
        <button class="input-icon-btn">
          <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
        <input type="text" class="input-field" id="inputField" placeholder="发消息或按住说话...">
        <button class="input-icon-btn">
          <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h0"/><path d="M12 12h0"/><path d="M16 12h0"/></svg>
        </button>
        <button class="input-icon-btn">
          <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="2" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="home-indicator"></div>
</div>

<script src="chat-app.js"></script>
</body>
</html>
